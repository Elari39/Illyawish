name: illyawish

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "5721"
    environment:
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MODEL: ${MODEL:-}
      APP_ENV: production
      SQLITE_PATH: /data/aichat.db
      UPLOAD_DIR: /data/uploads
      SERVER_PORT: "5721"
      SESSION_SECRET: ${SESSION_SECRET:-}
      SETTINGS_ENCRYPTION_KEY: ${SETTINGS_ENCRYPTION_KEY:-}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:10170}
      BOOTSTRAP_USERNAME: ${BOOTSTRAP_USERNAME:-}
      BOOTSTRAP_PASSWORD: ${BOOTSTRAP_PASSWORD:-}
    volumes:
      - ./docker-data/backend:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5721/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "10170:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
